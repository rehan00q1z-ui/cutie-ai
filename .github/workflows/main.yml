name: Build Flet APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Flet
        run: |
          pip install flet requests elevenlabs
          # यह लाइन यह सुनिश्चित करेगी कि flet कमांड का पता चल जाए
          python -m pip install flet

      - name: Build APK
        run: |
          # अब हम सीधे पायथन मॉड्यूल के ज़रिए बिल्ड चला रहे हैं
          python -m flet build apk --output build_output

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Cutie-AI-App
          path: build_output/*.apk
